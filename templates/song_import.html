<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>导入诗歌PPTX</title>
    <link rel="stylesheet" href="../static/css/custom.css" />
    <link rel="stylesheet" href="../static/css/import_song.css" />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body class="container py-4">
    <div class="import-shell">
      <div
        class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
          <h1 class="mb-1">导入旧诗歌 PPTX</h1>
          <p class="text-muted mb-0">
            这个页面默认按批次处理文件。拖入很多旧文件后，系统会分批转换并在最后打包下载。
          </p>
        </div>
        <a href="/" class="btn btn-outline-secondary">返回主页</a>
      </div>

      <div id="dropzone" class="dropzone">
        <input id="file-input" type="file" accept=".pptx" multiple hidden />
        <div class="dropzone-copy">
          <h3>拖拽文件到这里</h3>
          <p class="mb-3">支持一次放入多个 `.pptx` 文件</p>
          <button id="pick-files" type="button" class="btn btn-primary">
            选择文件
          </button>
        </div>
      </div>

      <div class="status-row mt-3">
        <span id="status-text" class="text-muted">等待上传文件</span>
      </div>

      <div class="batch-summary mt-3">
        <div class="summary-card">
          <div class="summary-label">当前队列</div>
          <div id="summary-count" class="summary-value">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">建议批大小</div>
          <div class="summary-value">25</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">处理进度</div>
          <div id="summary-progress" class="summary-value">0 / 0</div>
        </div>
      </div>

      <div class="progress-shell mt-3">
        <div class="progress">
          <div
            id="batch-progress-bar"
            class="progress-bar"
            role="progressbar"
            style="width: 0%"
            aria-valuenow="0"
            aria-valuemin="0"
            aria-valuemax="100"></div>
        </div>
      </div>

      <div class="action-row mt-4">
        <button id="export-btn" type="button" class="btn btn-primary" disabled>
          开始批量导出并下载PPTX
        </button>
        <button id="clear-btn" type="button" class="btn btn-outline-secondary" disabled>
          清空文件列表
        </button>
      </div>

      <div class="mt-4">
        <h5 class="mb-3">已添加文件</h5>
        <div id="selected-file-list" class="selected-file-list">
          <div class="selected-file-empty text-muted">还没有添加文件</div>
        </div>
      </div>

      <div class="mt-4">
        <h5 class="mb-3">批量处理结果</h5>
        <div id="result-list" class="result-list">
          <div class="selected-file-empty text-muted">处理开始后会在这里显示结果</div>
        </div>
      </div>
    </div>

    <script type="module" src="../static/js/song_import.js"></script>
  </body>
</html>
